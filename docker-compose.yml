version: '3.8'

services:
  backend:
    image: alpine:latest
    container_name: caps15-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: tail -f /dev/null
    networks:
      - gis_network

  frontend:
    image: alpine:latest
    container_name: caps15-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: tail -f /dev/null

  nginx:
    image: nginx:alpine
    container_name: caps15-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - gis_network
networks:
  gis_network:
    driver: bridge
